<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #12344d; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f2d40; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #224b63; }
      .box { fill: #f3f8fb; stroke: #2b6a88; stroke-width: 2; rx: 14; ry: 14; }
      .alt { fill: #eef5f8; }
      .arrow { stroke: #2b6a88; stroke-width: 2.2; fill: none; marker-end: url(#m); }
      .line { stroke: #8aa9bb; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b6a88" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>
  <text x="48" y="56" class="title">HRMS NewGen Web App - Existing Data Flow Architecture</text>

  <rect class="box" x="60" y="120" width="260" height="90"/>
  <text x="84" y="155" class="label">User Interaction</text>
  <text x="84" y="180" class="small">Browser UI events</text>

  <rect class="box" x="400" y="120" width="300" height="90"/>
  <text x="424" y="155" class="label">Route/Page Component</text>
  <text x="424" y="180" class="small">App.tsx - pages/* - components/*</text>

  <rect class="box alt" x="780" y="120" width="300" height="90"/>
  <text x="804" y="155" class="label">Local State + Effects</text>
  <text x="804" y="180" class="small">useState, useEffect, useMemo</text>

  <rect class="box" x="1160" y="120" width="300" height="90"/>
  <text x="1184" y="155" class="label">Service Layer</text>
  <text x="1184" y="180" class="small">services/apiService.ts</text>

  <rect class="box alt" x="1160" y="280" width="300" height="120"/>
  <text x="1184" y="320" class="label">HTTP Client</text>
  <text x="1184" y="345" class="small">services/apiClient.ts</text>
  <text x="1184" y="370" class="small">GET cache + inFlight dedupe</text>

  <rect class="box" x="1160" y="470" width="300" height="110"/>
  <text x="1184" y="510" class="label">Backend APIs</text>
  <text x="1184" y="535" class="small">/api/Leave, /api/ManageProfile,</text>
  <text x="1184" y="558" class="small">/api/Employee, /api/HolidayList</text>

  <rect class="box alt" x="1160" y="650" width="300" height="110"/>
  <text x="1184" y="690" class="label">Response Parse + Error Map</text>
  <text x="1184" y="715" class="small">JSON/Text parse, throw on !ok</text>
  <text x="1184" y="738" class="small">Type usage from types/apiTypes.ts</text>

  <rect class="box" x="780" y="820" width="300" height="100"/>
  <text x="804" y="860" class="label">State Update + Re-render</text>
  <text x="804" y="885" class="small">UI refresh without full reload</text>

  <rect class="box alt" x="400" y="820" width="300" height="100"/>
  <text x="424" y="860" class="label">User Outcome</text>
  <text x="424" y="885" class="small">Success message / navigation / error</text>

  <rect class="box" x="60" y="330" width="360" height="110"/>
  <text x="84" y="370" class="label">Custom Hooks</text>
  <text x="84" y="395" class="small">hooks/useHolidays.ts</text>
  <text x="84" y="418" class="small">hooks/useLeaveStatusCodes.ts</text>

  <rect class="box alt" x="60" y="510" width="360" height="110"/>
  <text x="84" y="550" class="label">Utilities</text>
  <text x="84" y="575" class="small">utils/Utils.ts (PDF/CSV export)</text>
  <text x="84" y="598" class="small">Used by reporting screens</text>

  <path class="arrow" d="M320 165 L400 165"/>
  <path class="arrow" d="M700 165 L780 165"/>
  <path class="arrow" d="M1080 165 L1160 165"/>
  <path class="arrow" d="M1310 210 L1310 280"/>
  <path class="arrow" d="M1310 400 L1310 470"/>
  <path class="arrow" d="M1310 580 L1310 650"/>
  <path class="arrow" d="M1160 725 L1080 725 L1080 870"/>
  <path class="arrow" d="M780 870 L700 870"/>
  <path class="arrow" d="M550 820 L550 210 L400 210"/>

  <path class="arrow" d="M420 385 L1160 335"/>
  <path class="arrow" d="M420 565 L1160 535"/>

  <path class="line" d="M1080 165 L1080 820"/>
  <text x="1090" y="500" class="small">Data round-trip</text>
</svg>
